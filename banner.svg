    <!-- Cursor moving and blinking -->
    <rect x="295" y="138" width="2" height="24" fill="#cc7ebc">
      <!-- Blinking -->
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
