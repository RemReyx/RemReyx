<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#f0ecfa"/>
      <stop offset="60%"  stop-color="#eaf0fc"/>
      <stop offset="85%"  stop-color="#fce8f4"/>
      <stop offset="100%" stop-color="#f5f5f8"/>
    </linearGradient>

    <!-- Glow filter for lines -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Stronger glow for dots -->
    <filter id="dotglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Circuit line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9a8e8" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#a8c0ee" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#e8a8d4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="lineGradR" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#c9a8e8" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#a8c0ee" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#e8a8d4" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>

  <!-- ===== LEFT SIDE CIRCUIT LINES ===== -->
  <g filter="url(#glow)" stroke="url(#lineGrad)" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 0 60 L 60 60 L 60 90 L 140 90 L 140 70 L 210 70"/>
    <path d="M 0 120 L 40 120 L 40 100 L 100 100 L 100 140 L 180 140 L 180 115 L 230 115"/>
    <path d="M 0 180 L 50 180 L 50 160 L 130 160 L 130 195 L 200 195"/>
    <path d="M 0 240 L 70 240 L 70 220 L 150 220 L 150 245 L 220 245"/>
    <path d="M 100 100 L 100 70 L 140 70"/>
    <path d="M 60 90 L 60 50 L 100 50"/>
  </g>

  <!-- Left node dots -->
  <g fill="#c4a8e8" filter="url(#dotglow)" opacity="0.6">
    <circle cx="60" cy="60" r="2.5"/>
    <circle cx="140" cy="90" r="2.5"/>
    <circle cx="140" cy="70" r="2.5"/>
    <circle cx="40" cy="120" r="2.5"/>
    <circle cx="100" cy="100" r="2.5"/>
    <circle cx="180" cy="140" r="2.5"/>
    <circle cx="50" cy="180" r="2.5"/>
    <circle cx="130" cy="160" r="2.5"/>
    <circle cx="70" cy="240" r="2.5"/>
    <circle cx="150" cy="220" r="2.5"/>
  </g>

  <!-- Traveling light dots on left paths -->
  <circle r="3.5" fill="#b896e0" filter="url(#dotglow)" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" begin="0s">
      <mpath href="#lp1"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#92b4e8" filter="url(#dotglow)" opacity="0.75">
    <animateMotion dur="4s" repeatCount="indefinite" begin="1s">
      <mpath href="#lp2"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#e4a0cc" filter="url(#dotglow)" opacity="0.7">
    <animateMotion dur="3.5s" repeatCount="indefinite" begin="0.5s">
      <mpath href="#lp3"/>
    </animateMotion>
  </circle>

  <!-- Hidden motion paths (left) -->
  <path id="lp1" fill="none" stroke="none" d="M 0 60 L 60 60 L 60 90 L 140 90 L 140 70 L 210 70"/>
  <path id="lp2" fill="none" stroke="none" d="M 0 120 L 40 120 L 40 100 L 100 100 L 100 140 L 180 140 L 180 115 L 230 115"/>
  <path id="lp3" fill="none" stroke="none" d="M 0 180 L 50 180 L 50 160 L 130 160 L 130 195 L 200 195"/>

  <!-- ===== RIGHT SIDE CIRCUIT LINES ===== -->
  <g filter="url(#glow)" stroke="url(#lineGradR)" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 900 80 L 840 80 L 840 55 L 760 55 L 760 85 L 690 85"/>
    <path d="M 900 150 L 860 150 L 860 125 L 780 125 L 780 160 L 700 160 L 700 135 L 660 135"/>
    <path d="M 900 210 L 850 210 L 850 190 L 770 190 L 770 220 L 690 220"/>
    <path d="M 900 265 L 830 265 L 830 245 L 750 245 L 750 270 L 680 270"/>
    <path d="M 840 80 L 840 45 L 800 45"/>
    <path d="M 780 125 L 780 100 L 760 100 L 760 55"/>
  </g>

  <!-- Right node dots -->
  <g fill="#a8c0ee" filter="url(#dotglow)" opacity="0.6">
    <circle cx="840" cy="80" r="2.5"/>
    <circle cx="760" cy="55" r="2.5"/>
    <circle cx="760" cy="85" r="2.5"/>
    <circle cx="860" cy="150" r="2.5"/>
    <circle cx="780" cy="125" r="2.5"/>
    <circle cx="700" cy="160" r="2.5"/>
    <circle cx="850" cy="210" r="2.5"/>
    <circle cx="770" cy="190" r="2.5"/>
    <circle cx="830" cy="265" r="2.5"/>
    <circle cx="750" cy="245" r="2.5"/>
  </g>

  <!-- Traveling dots on right paths -->
  <circle r="3.5" fill="#92b4e8" filter="url(#dotglow)" opacity="0.8">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="0.8s">
      <mpath href="#rp1"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#b896e0" filter="url(#dotglow)" opacity="0.75">
    <animateMotion dur="4.2s" repeatCount="indefinite" begin="0s">
      <mpath href="#rp2"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#e4a0cc" filter="url(#dotglow)" opacity="0.7">
    <animateMotion dur="3.8s" repeatCount="indefinite" begin="1.5s">
      <mpath href="#rp3"/>
    </animateMotion>
  </circle>

  <!-- Hidden motion paths (right) -->
  <path id="rp1" fill="none" stroke="none" d="M 900 80 L 840 80 L 840 55 L 760 55 L 760 85 L 690 85"/>
  <path id="rp2" fill="none" stroke="none" d="M 900 150 L 860 150 L 860 125 L 780 125 L 780 160 L 700 160 L 700 135 L 660 135"/>
  <path id="rp3" fill="none" stroke="none" d="M 900 210 L 850 210 L 850 190 L 770 190 L 770 220 L 690 220"/>

  <!-- ===== TYPEWRITER TEXT (center) ===== -->

  <g font-family="'Courier New', monospace" font-size="22" font-weight="600" fill="#cc7ebc" text-anchor="middle">
    <!-- Using multiple rects to cover/uncover strings to simulate typing and deleting.
         Total cycle time: 16s (4 phrases x 4s each)
    -->

    <!-- Phrase 1: Full-Stack Developer 🚀 -->
    <g>
      <text x="450" y="158">Full-Stack Developer 🚀</text>
      <!-- Cover rectangle moves left to right (typing) then right to left (deleting) -->
      <rect x="250" y="130" width="400" height="40" fill="url(#bg)">
        <animate attributeName="x" values="250; 650; 650; 250; 250" keyTimes="0; 0.125; 0.22; 0.25; 1" dur="16s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </g>

    <!-- Phrase 2: Building Fast & Beautiful UIs 🎨 -->
    <g>
      <text x="450" y="158">Building Fast &amp; Beautiful UIs 🎨</text>
      <rect x="250" y="130" width="400" height="40" fill="url(#bg)">
        <animate attributeName="x" values="250; 250; 650; 650; 250; 250" keyTimes="0; 0.25; 0.375; 0.47; 0.5; 1" dur="16s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </g>

    <!-- Phrase 3: Laravel | React | TypeScript -->
    <g>
      <text x="450" y="158">Laravel | React | TypeScript</text>
      <rect x="250" y="130" width="400" height="40" fill="url(#bg)">
        <animate attributeName="x" values="250; 250; 650; 650; 250; 250" keyTimes="0; 0.5; 0.625; 0.72; 0.75; 1" dur="16s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </g>

    <!-- Phrase 4: Always learning, always growing 🌱 -->
    <g>
      <text x="450" y="158">Always learning, always growing 🌱</text>
      <rect x="250" y="130" width="400" height="40" fill="url(#bg)">
        <animate attributeName="x" values="250; 250; 650; 650; 250; 250" keyTimes="0; 0.75; 0.875; 0.97; 1; 1" dur="16s" repeatCount="indefinite" fill="freeze"/>
      </rect>
    </g>

    <!-- Cursor moving and blinking -->
    <rect y="138" width="2" height="24" fill="#cc7ebc">
      <!-- Blinking -->
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      <!-- X position exactly following the edge of the cover rectangles.
           The text width varies from ~260 to 380px.
           Center is 450.
           Phrase 1 (Full-Stack Developer 🚀): width ~310. Start ~295, End ~605.
           Phrase 2 (Building Fast...): width ~390. Start ~255, End ~645.
           Phrase 3 (Laravel...): width ~320. Start ~290, End ~610.
           Phrase 4 (Always learning...): width ~390. Start ~255, End ~645.
      -->
      <animate attributeName="x"
               values="
                 450;
                 295; 605; 605; 295;
                 255; 645; 645; 255;
                 290; 610; 610; 290;
                 255; 645; 645; 255
               "
               keyTimes="
                 0;
                 0.001; 0.125; 0.22; 0.25;
                 0.251; 0.375; 0.47; 0.5;
                 0.501; 0.625; 0.72; 0.75;
                 0.751; 0.875; 0.97; 1
               "
               dur="16s" repeatCount="indefinite" fill="freeze"/>
    </rect>
  </g>

</svg>
